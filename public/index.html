<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de produtos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <h1> Gerenciador de Produtos</h1>
        <p class="subtitle">Aplicação de Produtos</p>
      </div>
    </header>

    <!-- Conteúdo Principal -->
    <main>
      <div class="container">
        <!-- Seção de Formulário -->
        <section class="form-section">
          <h2>Adicionar ou Editar Produtos</h2>
          <form id="produtoForm">

            <div class="form-group">
              <label for="nomeProd">Nome do produto:</label>
              <input
                type="text"
                id="nomeprod"
                name="nomeprod"
                placeholder="Digite o nome completo"
                required
              />
            </div>

            <div class="form-group">
              <label for="preco">Preço:</label>
              <input
                type="number"
                id="preco"
                name="preco"
                placeholder="0.00"
                step="0.01"
                required
              />
            </div>
                
             
            

            <div class="form-group">
              <label for="catProd">Categoria:</label>
              <input
                type="text"
                id="catprod"
                name="catprod"
                placeholder="Digite a categoria"
                required
              />
            </div>

            <div class="form-group">
              <label for="modelo">Modelo:</label>
              <input
                type="text"
                id="modelo"
                name="modelo"
                placeholder="Digite o modelo"
                required
              />
            </div>

            <div class="form-group">
              <label for="fabricante">Fabricante:</label>
              <input
                type="text"
                id="fabricante"
                name="fabricante"
                placeholder="Digite o fabricante"
                required
              />
            </div>

          

            <div class="form-group">
              <label for="estoque">Estoque:</label>
              <input
                type="number"
                id="estoque"
                name="estoque"
                placeholder="0"
                step="1"
                required
              />
            </div>

            <div class="form-group">
              <label for="locall">Local:</label>
              <input
                type="text"
                id="locall"
                name="locall"
                placeholder="digite o local"
                required
              />

            </div>

              
 <div class="form-buttons">
              <button type="submit" class="btn btn-primary">
                Salvar produto
              </button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">
                Limpar Formulário
              </button>
            </div>
          </form>
        </section>
 
  
        <!-- Seção de Listagem -->
        <section class="list-section">
          <h2>Lista de produtos</h2>

          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">
              🔄 Recarregar Lista
            </button>
            <div class="search-box">
              <select id="searchType" title="Selecionar tipo de busca">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>
              <input
                type="text"
                id="searchInput"
                placeholder="Digite o valor para buscar..."
              />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>

          <div
 id="loadingMessage"
            class="message message-info"
          >
            Carregando produtos...
          </div>

          <div id="emptyMessage" class="message message-info">
            Nenhum produto cadastrado. Adicione um novo produto usando o
            formulário acima.
          </div>

          <div id="produtoList" class="produto-table-container">
            <!-- Tabela será preenchida via JavaScript -->
          </div>
        </section>
      </div> 
    </div>
    </main>

    <!-- Rodapé -->
    <footer>
      <p>
        &copy; 2026 - Sistema de Gestão de produtos | Desenvolvido para Alunos
        de Desenvolvimento de Sistemas
      </p>
    </footer>

    <!-- Modal de Mensagens -->
    <div id="modalMessage" class="modal-message">
      <div class="modal-content">
        <p id="modalText"></p>
        <button class="btn btn-primary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>

    <script src="script.js"></script>
 </body>
</html>
